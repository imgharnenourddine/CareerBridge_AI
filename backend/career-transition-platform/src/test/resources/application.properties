# In-memory DB for tests (no PostgreSQL or env vars required)
springdotenv.enabled=false

jwt.secret=test-jwt-secret-key-for-unit-tests-min-32-chars
jwt.expiration=86400000

mistral.api-key=test-mistral-key
groq.api-key=test-groq-key
assemblyai.api-key=test-assemblyai-key
elevenlabs.api-key=test-elevenlabs-key
elevenlabs.voice-id=test-voice-id
unreal-speech.api-key=test-unreal-speech-key

spring.mail.host=localhost
spring.mail.port=3025
spring.mail.username=test@test.com
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

mail.imap.host=localhost
mail.imap.port=3993
mail.imap.username=test@test.com
mail.imap.password=test
mail.imap.polling.enabled=false

minio.url=http://127.0.0.1:9000
minio.access-key=test
minio.secret-key=test
minio.bucket-name=test-bucket
minio.verify-bucket-at-startup=false

spring.datasource.url=jdbc:h2:mem:careerbridge_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
