# Application
spring.application.name=career-transition-platform
server.port=8080

# spring-dotenv : répertoire contenant le fichier .env (souvent le module Maven = ${user.dir})
springdotenv.directory=${SPRINGDOTENV_DIRECTORY:${user.dir}}

# JWT (JWT_SECRET dans .env — clé HMAC-S256 : au moins 32 caractères UTF-8)
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Speech & AI (keys from .env — simulation placeholders OK for local dev)
mistral.api-key=${MISTRAL_API_KEY}
groq.api-key=${GROQ_API_KEY}
assemblyai.api-key=${ASSEMBLYAI_API_KEY}
elevenlabs.api-key=${ELEVENLABS_API_KEY}
elevenlabs.voice-id=${ELEVENLABS_VOICE_ID}
unreal-speech.api-key=${UNREAL_SPEECH_API_KEY}

# SMTP (Gmail)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# IMAP (Gmail) — Jakarta Mail
mail.imap.host=imap.gmail.com
mail.imap.port=993
mail.imap.username=${MAIL_USERNAME}
mail.imap.password=${MAIL_PASSWORD}
mail.imap.polling.enabled=true

# MinIO
minio.url=${MINIO_URL}
minio.access-key=${MINIO_ACCESS_KEY}
minio.secret-key=${MINIO_SECRET_KEY}
minio.bucket-name=${MINIO_BUCKET_NAME:eng-documents}
minio.verify-bucket-at-startup=${MINIO_VERIFY_BUCKET:true}

# Multipart uploads (photos profil)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Database (valeurs depuis .env à la racine du dépôt, ou variables d'environnement)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Logging
logging.level.root=INFO
logging.level.com.ai.guild.career_transition_platform=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %5p [%t] %logger{36} - %msg%n
